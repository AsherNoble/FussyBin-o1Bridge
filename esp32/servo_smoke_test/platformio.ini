[env:esp32-wrover]
platform          = espressif32
board             = esp-wrover-kit   ; WROVER variant — enables PSRAM by default
framework         = arduino
upload_speed      = 460800
monitor_speed     = 115200           ; matches Serial.begin(115200) in the sketch

lib_deps =
    https://github.com/ftservo/FTServo_Arduino/archive/refs/heads/main.zip
